<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel de Imagens</title>
    <link rel="stylesheet" href="../style/style1.css">
</head>   
<body>
    <div class="logo">

        <img src="../imagem/grilo.png">

    </div>

    <div class="carousel-container">
        <div class="carousel-images">
            <img src="https://picsum.photos/1000/600?random=1" alt="Imagem 1">
            <img src="https://picsum.photos/1000/600?random=2" alt="Imagem 2">
            <img src="https://picsum.photos/1000/600?random=3" alt="Imagem 3">
            <img src="https://picsum.photos/1000/600?random=4" alt="Imagem 4">
            <img src="https://picsum.photos/1000/600?random=5" alt="Imagem 5">
        </div>

        <button id="prevBtn" class="carousel-btn prev">&#10094;</button>
        <button id="nextBtn" class="carousel-btn next">&#10095;</button>

        <div class="carousel-dots"></div>
    </div>
<script src="../script/script1.js"></script>

<footer>
    <div class="contato-footer">
        <button>
            <i class="bi bi-envelope-at-fill"></i> E-mail
        </button>
        <button>
            <i class="bi bi-telephone"></i> Telefone
        </button>
    </div>
    <p>Texto do rodapé</p>
</footer>
</body>
</html>
